name: Run Add and Remove Elements Test
on:
    workflow_dispatch:
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4
        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: 3.14.3
        - name: Install dependencies
          run: |
            #Install Chrome browser and driver
            sudo apt-get update
            sudo apt-get install -y chromium-browser chromium-chromedriver
            
            #Install Poetry and Python Dependencies
            curl -sSL https://install.python-poetry.org | python3 -
            poetry config virtualenvs.in-project true
            poetry install  --no-root
        - name: Add and Remove Elements Test
          run: |
            poetry run python -m pytest SeleniumTests/test_add_remove_elements.py -v --html=results/test_add_remove_elements_$(date +'%s').html
          env:
            CHROME_BIN: /usr/bin/chromium-browser
        - name: Upload result file as artifact
          id: deployment
          uses: actions/upload-pages-artifact@v3
          with:
            path: results/

          
