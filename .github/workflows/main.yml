name: Run Add and Remove Elements Test
on:
    workflow_dispatch:
      inputs:
        test_to_run:
          type: choice
          options:
            - add_remove_elements
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4
        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: 3.14.3
        - name: Install dependencies
          run: |
            #Install Chrome browser and driver
            sudo apt-get update
            sudo apt-get install -y chromium-browser chromium-chromedriver
            
            #Install Poetry and Python Dependencies
            curl -sSL https://install.python-poetry.org | python3 -
            poetry config virtualenvs.in-project true
            poetry install  --no-root
        - name: ${{inputs.test_to_run}} Test
          run: |
            poetry run python -m pytest SeleniumTests/test_${{inputs.test_to_run}}.py -v --html=results/test_add_remove_elements_$(date +'%s').html
          env:
            CHROME_BIN: /usr/bin/chromium-browser
        - name: Upload results as artifact
          id: deployment
          uses: actions/upload-artifact@v4
          with:
            name: ${{inputs.test_to_run}} Test Results
            retention-days: 30
            path: results/

          
